name: Build LaTeX Resume

# Запускать скрипт при каждом пуше в ветки main и dev,
# но ТОЛЬКО если изменился исходный код (.tex)
on:
  push:
    branches:
      - main
      - dev
    paths:
      - '**.tex'

jobs:
  build_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: CV_Dmitry_Guminov.tex  

      - name: Commit PDF back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-compile LaTeX PDF"
          file_pattern: CV_Dmitry_Guminov.pdf